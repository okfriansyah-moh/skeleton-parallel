name: Release

on:
  push:
    tags:
      - "v*.*.*"

permissions:
  contents: write

jobs:
  package:
    name: Package
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Build archive
        run: |
          VERSION="${GITHUB_REF_NAME}"
          mkdir -p dist

          tar -czf "dist/skeleton-parallel-${VERSION}.tar.gz" \
            --exclude='.git' \
            --exclude='.skeleton-dev' \
            --exclude='dist' \
            --exclude='__pycache__' \
            --exclude='*.pyc' \
            -C "$(pwd)" .

          sha256sum "dist/skeleton-parallel-${VERSION}.tar.gz" \
            | awk '{print $1}' \
            > "dist/skeleton-parallel-${VERSION}.tar.gz.sha256"

      - name: Verify archive
        run: |
          tar -tzf dist/skeleton-parallel-*.tar.gz | grep -q "bin/skeleton" \
            && echo "bin/skeleton present" || { echo "MISSING bin/skeleton"; exit 1; }

      - uses: actions/upload-artifact@v4
        with:
          name: release-assets
          path: dist/

  release:
    name: Create GitHub Release
    needs: package
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/download-artifact@v4
        with:
          name: release-assets
          path: dist/

      - name: List release assets
        run: ls -lh dist/

      - uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          fail_on_unmatched_files: true
          files: dist/*
