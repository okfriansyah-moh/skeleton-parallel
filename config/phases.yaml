# Phases Configuration
# ─────────────────────────────────────────────────────────────────────────────
# Define your implementation phases here. This file is read by run_parallel.sh
# to determine phase names, complexity scores, grouping, and required skills.
#
# After generating docs/architecture.md and docs/implementation_roadmap.md,
# update this file to match your pipeline stages.
#
# Fields:
#   name       — Human-readable phase name (used in logs and task files)
#   complexity — Score 1-10 (highest gets the heavy model in parallel mode)
#   group      — Letter A-Z (phases in the same group run sequentially)
#   skills     — Comma-separated skill names required for this phase
# ─────────────────────────────────────────────────────────────────────────────

phases:
  0:
    name: "core-infrastructure"
    complexity: 8
    group: "A"
    skills: "idempotency, failure"
